name: Bug Report
description: Something isn't working as expected
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Enable plugin ...
        2. Run skill / agent ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Plugin version, Claude Code version, OS.
      placeholder: |
        Plugin: turtlestack@1.12.2
        Claude Code: 1.x
        OS: macOS 15
    validations:
      required: false
